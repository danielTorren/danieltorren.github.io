  - title: "An agent-based model of cultural change for a low-carbon transition"
    authors: "Daniel Torren-Peraire, Ivan Savin, Jeroen C.J.M. van den Bergh"
    conference_short: "JASSS"
    conference: "Journal of Artificial Societies and Social Simulation, 2024."
    pdf: "https://www.jasss.org/27/1/13.html"
    code: "https://github.com/danielTorren/Culture-Network"
    data: ""
    notes: "JASSS Best PhD Student Article 2025"
    image: "/assets/img/jasss.png"
    abstract: >
     Meeting climate goals requires radical changes in the consumption behaviour of individuals. This necessitates an understanding of how the diffusion of low-carbon behaviour will occur. The speed and interdependency of these changes in behavioural choices may be modulated by individuals’ culture. We develop an agent-based model to study how behavioural decarbonisation interacts with longer-term cultural change, composed of individuals with multiple behaviours that evolve due to imperfect social learning in a social network. Using the definition of culture as socially transmitted information, we represent individuals’ environmental identity as an aggregation of attitudes towards multiple relevant behaviours. The strength of interaction between individuals is determined by the similarity in their environmental identity, leading to inter-behavioural dependency and spillovers in green attitudes. Our results show that the initial distribution of agent attitudes towards behaviours and asymmetries in social learning, such as confirmation bias, are the main drivers of model dynamics, helping to generate awareness of what roadblocks may appear to deep decarbonisation. To assess the impact of culture beyond a purely diffusive regime, we introduce green influencers as a minority of individuals who broadcast a green attitude. The greatest emissions reduction is achieved with the inclusion of culture, relative to a behavioural independence case, and with low confirmation bias. However, green influencers fail to achieve deep behavioural decarbonisation through solely voluntary action. We identify areas for further research regarding how culture, through inter-behavioural dependence, may be leveraged for climate policy.

  - title: "(Mis)information Diffusion and the Financial Market"
    authors: "Tommaso Di Francesco, Daniel Torren-Peraire"
    conference_short: "JEBO"
    conference: "Journal of Economic Behavior & Organization, 2025."
    pdf: "https://www.sciencedirect.com/science/article/pii/S0167268125003300"
    code: "https://github.com/danielTorren/Misinformation_financial_markets"
    data: ""
    notes: ""
    image: "/assets/img/misinformation.png"
    abstract: >
      This paper investigates the interplay between information diffusion in social networks and its impact on financial markets with an Agent-Based Model (ABM). Agents receive and exchange information about an observable stochastic component of the dividend process of a risky asset à la Grossman and Stiglitz (1980). A small proportion of the network has access to a private signal about the component, which can be clean (information) or distorted (misinformation). Other agents are uninformed and can receive information only from their peers. All agents are Bayesian, adjusting their beliefs according to the confidence they have in the source of information. We examine, by means of simulations, how information diffuses in the network and provide a framework to account for delayed absorption of shocks, that are not immediately priced as predicted by classical financial models. We investigate the effect of the network topology on the resulting asset price and evaluate under which condition misinformation diffusion can make the market more inefficient.

  - title: "The cultural multiplier of climate policy"
    authors: "Daniel Torren-Peraire, Ivan Savin, Jeroen C.J.M. van den Bergh"
    conference_short: "ERE"
    conference: "Environmental and Resource Economics, 2025."
    pdf: "https://link.springer.com/article/10.1007/s10640-025-01048-z"
    code: "https://github.com/danielTorren/The_cultural_multiplier"
    data: ""
    notes: ""
    image: "/assets/img/cultural_multiplier.png"
    abstract: >
      To achieve deep decarbonisation, the design of climate policy needs to account for consumption choices being influenced not only by pricing but also by social learning. This involves changes that pertain to the whole spectrum of consumption, likely involving shifts in lifestyles. In this regard, it is crucial to consider social learning not only in the short term but also slower and longer-term cultural change. Against this background, we analyse the interaction between climate policy and cultural change, focusing on carbon pricing. We extend the notion of “social multiplier” of environmental policy derived in an earlier study to the context of multiple consumer needs while allowing for behavioural spillovers between these, giving rise to a “cultural multiplier”. We develop a model to assess how this multiplier contributes to the effectiveness of carbon pricing. Our results show that the cultural multiplier stimulates a greater reduction in emissions compared to fixed preferences and the social multiplier. These findings are also good news for policy acceptance since the cultural multiplier greatly increases the effectiveness of a carbon price, meaning a lower price suffices for a given emissions-reduction goal. At high carbon prices, the distinction between social and cultural multiplier effects diminishes, as the strong price signal drives even resistant individuals toward low-carbon consumption. By varying economic and social conditions, such as substitutability between low- and high-carbon goods, social network structure, proximity of like-minded individuals, diversity of consumption lifestyles, and heterogeneity of preferences, the model provides insight into how cultural change can be leveraged to secure maximum effectiveness of climate policy.

  - title: "Driving in the wrong direction? A co-evolutionary model of electric vehicle adoption"
    authors: "Daniel Torren-Peraire"
    conference_short: "SSRN"
    conference: "SSRN Working Paper, 2025."
    pdf: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5241949"
    code: "https://github.com/danielTorren/endogenous_innovation_and_preference_change"
    data: ""
    notes: "Under Review"
    image: "/assets/img/EV_adoption.png"
    abstract: >
      Car-centric societies face substantial challenges in transitioning to sustainable mobility, with electric vehicle adoption depending on the interaction of consumer behaviour, firm innovation, and policy incentives. To examine these dynamics, this paper develops an agent-based model calibrated on California data from 2001–2023. Heterogeneous car users purchase new and used cars, while manufacturers develop new models. We evaluate individual and combined policy instruments, including carbon pricing, new and used purchase rebates, production subsidies, and electricity price subsidies. Results indicate that only carbon pricing and new vehicle purchase rebates achieve 95% electric vehicle adoption by 2035. Each policy has trade-offs: carbon pricing reduces consumer welfare, while new purchase rebates create heavy fiscal burdens. Policy combinations reduce the intensity of interventions, minimise rebound effects, and mitigate trade-offs. However, cumulative emissions remain lower under business-as-usual until the 2040s, indicating that additional policy is needed to reduce reliance on private vehicles.